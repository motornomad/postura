version: "3.9"

services:
  neo4j:
    image: neo4j:5-community
    ports:
      - "7474:7474"   # Browser UI
      - "7687:7687"   # Bolt protocol
    environment:
      NEO4J_AUTH: neo4j/postura_dev
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7474"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      POSTURA_NEO4J_URI: bolt://neo4j:7687
      POSTURA_NEO4J_USER: neo4j
      POSTURA_NEO4J_PASSWORD: postura_dev
      POSTURA_REDIS_URL: redis://redis:6379/0
      POSTURA_CELERY_BROKER_URL: redis://redis:6379/0
      POSTURA_CELERY_RESULT_BACKEND: redis://redis:6379/1
    command: uvicorn postura.api.app:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./src:/app/src
      - ./knowledge_data:/app/knowledge_data

  worker:
    build: .
    depends_on:
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      POSTURA_NEO4J_URI: bolt://neo4j:7687
      POSTURA_NEO4J_USER: neo4j
      POSTURA_NEO4J_PASSWORD: postura_dev
      POSTURA_REDIS_URL: redis://redis:6379/0
      POSTURA_CELERY_BROKER_URL: redis://redis:6379/0
      POSTURA_CELERY_RESULT_BACKEND: redis://redis:6379/1
    command: celery -A postura.tasks:celery_app worker --loglevel=info
    volumes:
      - ./src:/app/src

volumes:
  neo4j_data:
  neo4j_logs:
